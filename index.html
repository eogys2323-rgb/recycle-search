<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<title>폐기물 검색</title>
</head><style>

body{
    font-family: Arial, sans-serif;
    width:100%;
    max-width:none;
    margin:0;
    padding:20px;
    box-sizing:border-box;
}

h1{

    text-align:center;
    font-size:130px;

}

#search{
    flex:1;
    height:100px;
    padding:0 20px;
    font-size:30px;

    border:3px solid #4CAF50;
    border-right:none;
    border-radius:10px 0 0 10px;
    box-sizing:border-box;
}
button{
    padding:50px 50px;
    font-size:35px;
}

#result{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    padding:10px;
    font-size:27px;

}

.detail{
    width:100%;
    max-width:1200px;
    margin:30px auto;
    padding:30px;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    align-items:center;

    background:white;
    border-radius:15px;
}

.detail h2{
    font-size:80px;
    margin-bottom:30px;
}

.detail p{
    width:100%;
    max-width:900px;
    font-size:42px;
    line-height:1.8;
    text-align:left;
    margin:15px auto;
}

.detail img{
    max-width:100%;
}

.photo-box{
    display:inline-block;
    margin:10px;
    text-align:center;
}

.detail-photo{
    width:320px;
    height:320px;
    object-fit:cover;
    border-radius:10px;
    cursor:zoom-in;
}

.search-box{
    display:flex;
    align-items:stretch;
}
.search-box input{
    flex:1;
    max-width:100%;
}

.search-box button{

    width:110px;
    padding:0 25px;

    display:flex;
    justify-content:center;
    align-items:center;

    white-space:nowrap;

    border:2px solid #4CAF50;
    border-radius:0 10px 10px 0;

    background:#4CAF50;
    color:white;

    font-size:40px;
    font-weight:bold;

    flex-shrink:0;

    padding:0;

}
@media (max-width: 768px){

    body{
        padding:10px;
    }

    #search{
        width:100%;
        box-sizing:border-box;
        margin-bottom:10px;
    }

    button{
    width:auto;
}

.search-box button{
    width:110px;
    height:70px;
}

    #result{
        grid-template-columns:1fr;
    }

    .card img{
        height:auto;
    }

    .detail img{
        width:100%;
        max-width:100%;
    }

    .detail{
    width:100%;
    box-sizing:border-box;
    
}

}

#categories{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:15px;

margin:25px 0;

}

#categories button{

padding:20px 35px;

font-size:38px;

font-weight:bold;

border:none;

border-radius:20px;

background:#4CAF50;

color:white;

cursor:pointer;

}

#categories button:hover{
    background:#2e7d32;
}

.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal img{
    max-width:90%;
    max-height:90%;
}

#close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.detail-photo{
    cursor:zoom-in;
}

.photo-list{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:30px;
    margin:20px 0 40px;
}

.photo-box{
    text-align:center;
}

.photo-box b{
    display:block;
    margin-top:30px;
    font-size:35px;
    font-weight:bold;
}

</style>
<body>

<h1>폐기물 검색</h1>

<div class="search-box">

<input
id="search"
placeholder="검색어 입력"
list="items">

<datalist id="items"></datalist>

<button onclick="searchItem()">검색</button>

</div>

<div id="categories">

<button onclick="filterCategory('전체')">전체</button>

<button onclick="filterCategory('재활용품')">♻️ 재활용품</button>

<button onclick="filterCategory('스티로폼')">📦 스티로폼</button>

<button onclick="filterCategory('영농폐기물')">🌾 영농폐기물</button>

<button onclick="filterCategory('건설폐기물')">🏗 건설폐기물</button>

<button onclick="filterCategory('일반쓰레기')">🗑 일반쓰레기</button>

<button onclick="filterCategory('형광등')">💡 형광등</button>

<button onclick="filterCategory('지정폐기물')">🛢️지정폐기물</button>

</div>

<div id="result"></div>

<script src="data.js"></script>

<script>

let currentCategory = "전체";

const list = document.getElementById("items");

Object.keys(data).forEach(function(item){

const option = document.createElement("option");

option.value = item;

list.appendChild(option);

});

document.getElementById("search").addEventListener("keydown", function(e){

if(e.key === "Enter"){

searchItem();

}

});

function filterCategory(category){

    currentCategory = category;

    searchItem();

}

function searchItem(){

    document.getElementById("result").style.display = "grid";

const q = document.getElementById("search").value.trim();

let txt = "";

Object.keys(data).forEach(function(item){

const keywordMatch =

q === ""

||

item.includes(q)

||

data[item].keywords.some(
keyword => keyword.includes(q)
);

const categoryMatch =

currentCategory === "전체"

||

(
    data[item].category &&
    data[item].category.includes(currentCategory)
);

const found = keywordMatch && categoryMatch;

if(found){

txt += `

<div class="card"
onclick="showDetail('${item}')">

<img
src="${data[item].images[0].file}"
alt="${item}">

<h3>${item}</h3>

</div>
`;

}

});

if(txt === ""){

txt = `
<h2>검색 결과가 없습니다.</h2>
`;

}

document.getElementById("result").innerHTML = txt;

}

function showDetail(name){

    history.pushState(
        { page:"detail", item:name },
        "",
        "#" + encodeURIComponent(name)
    );

    document.getElementById("result").style.display = "block";

    let imgs = "";

    data[name].images.forEach(function(img){

        imgs += `
        <div class="photo-box">

            <img
            src="${img.file}"
            class="detail-photo"
            alt="${img.title}"
            onclick="openImage(this.src)">

            <br>

            <b>${img.title}</b>

        </div>
        `;

    });

    document.getElementById("result").innerHTML = `

    <div class="detail">

        <h2>${name}</h2>

        <div class="photo-list">
            ${imgs}
        </div>

        <p>${data[name].desc}</p>

        <p>
            <b>배출방법</b><br>
            ${data[name].method}
        </p>

        <button onclick="history.back()">
            목록으로
        </button>

    </div>

    `;

}

searchItem();

function openImage(src){

    history.pushState(
        {page:"image"},
        "",
        "#image"
    );

    const modal = document.getElementById("imgModal");
    const modalImg = document.getElementById("modalImg");

    modal.style.display = "flex";
    modalImg.src = src;

}

function closeImage(){

    document.getElementById("imgModal").style.display = "none";

}

document.getElementById("imgModal").onclick = function(e){

    if(e.target === this){

        history.back();

    }

};

window.addEventListener("popstate", function(e){

    const modal = document.getElementById("imgModal");

    // 사진이 열려 있으면 사진만 닫기
    if(modal.style.display === "flex"){
        closeImage();
        return;
    }

    if(e.state && e.state.page === "detail"){

        showDetail(e.state.item);

    }else{

        searchItem();

    }

});

history.replaceState(
    {page:"list"},
    "",
    ""
);

</script>

<div id="imgModal" class="modal">
    <span id="close" onclick="closeImage()">&times;</span>
    <img id="modalImg">
</div>

</body>
</html>
