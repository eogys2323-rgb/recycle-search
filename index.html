<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>폐기물 검색</title>
</head><style>

body{
    font-family: Arial, sans-serif;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

#search{
    width:300px;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 15px;
    font-size:16px;
}

#result{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    text-align:center;
    padding:10px;
}

.detail{
    border:1px solid #ccc;
    padding:20px;
    border-radius:10px;
}

.detail img{
    max-width:100%;
}

.photo-box{
    display:inline-block;
    margin:10px;
    text-align:center;
}

.detail-photo{
    width:250px;
    height:250px;
    object-fit:cover;
    border:1px solid #ddd;
    border-radius:10px;
}

@media (max-width: 768px){

    body{
        padding:10px;
    }

    #search{
        width:100%;
        box-sizing:border-box;
        margin-bottom:10px;
    }

    button{
        width:100%;
    }

    #result{
        grid-template-columns:1fr;
    }

    .card img{
        height:auto;
    }

    .detail img{
        width:100%;
        max-width:100%;
    }

    .detail{
    width:100%;
    box-sizing:border-box;
}

}

#categories{

display:flex;

flex-wrap:wrap;

gap:10px;

margin-top:20px;

margin-bottom:20px;

}

#categories button{

padding:10px 15px;

border:none;

border-radius:20px;

background:#4CAF50;

color:white;

cursor:pointer;

}

#categories button:hover{
    background:#2e7d32;
}

.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal img{
    max-width:90%;
    max-height:90%;
}

#close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.detail-photo{
    cursor:zoom-in;
}

</style>
<body>

<h1>폐기물 검색</h1>

<input
id="search"
placeholder="검색어 입력"
list="items">

<datalist id="items"></datalist>

<button onclick="searchItem()">검색</button>

<div id="categories">

<button onclick="filterCategory('전체')">전체</button>

<button onclick="filterCategory('재활용품')">♻️ 재활용품</button>

<button onclick="filterCategory('스티로폼')">📦 스티로폼</button>

<button onclick="filterCategory('영농폐기물')">🌾 영농폐기물</button>

<button onclick="filterCategory('건설폐기물')">🏗 건설폐기물</button>

<button onclick="filterCategory('일반쓰레기')">🗑 일반쓰레기</button>

<button onclick="filterCategory('형광등')">💡 형광등</button>

<button onclick="filterCategory('지정폐기물')">🪑지정폐기물</button>

</div>

<div id="result"></div>

<script src="data.js"></script>

<script>

let currentCategory = "전체";

const list = document.getElementById("items");

Object.keys(data).forEach(function(item){

const option = document.createElement("option");

option.value = item;

list.appendChild(option);

});

document.getElementById("search").addEventListener("keydown", function(e){

if(e.key === "Enter"){

searchItem();

}

});

function filterCategory(category){

    currentCategory = category;

    searchItem();

}

function searchItem(){

const q = document.getElementById("search").value.trim();

let txt = "";

Object.keys(data).forEach(function(item){

const keywordMatch =

q === ""

||

item.includes(q)

||

data[item].keywords.some(
keyword => keyword.includes(q)
);

const categoryMatch =

currentCategory === "전체"

||

(
    data[item].category &&
    data[item].category.includes(currentCategory)
);

const found = keywordMatch && categoryMatch;

if(found){

txt += `

<div class="card"
onclick="showDetail('${item}')">

<img
src="${data[item].images[0].file}"
alt="${item}">

<h3>${item}</h3>

</div>
`;

}

});

if(txt === ""){

txt = `
<h2>검색 결과가 없습니다.</h2>
`;

}

document.getElementById("result").innerHTML = txt;

}

function showDetail(name){

let imgs = "";

data[name].images.forEach(function(img){

imgs += `
<div class="photo-box">

<img
src="${img.file}"
class="detail-photo"
alt="${img.title}"
onclick="openImage(this.src)">

<br>

<b>${img.title}</b>

</div>
`;

});

document.getElementById("result").innerHTML = `

<div class="detail">

<h2>${name}</h2>

${imgs}

<p>${data[name].desc}</p>

<p>
<b>배출방법</b><br>
${data[name].method}
</p>

<button onclick="searchItem()">
목록으로
</button>

</div>

`;

}

searchItem();

function openImage(src){
    const modal = document.getElementById("imgModal");
    const modalImg = document.getElementById("modalImg");

    modal.style.display = "flex";
    modalImg.src = src;
}

function closeImage(){
    document.getElementById("imgModal").style.display = "none";
}

document.getElementById("imgModal").onclick = function(e){

    if(e.target === this){

        closeImage();

    }

}
</script>

<div id="imgModal" class="modal">
    <span id="close" onclick="closeImage()">&times;</span>
    <img id="modalImg">
</div>

</body>
</html>
